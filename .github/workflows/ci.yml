name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
      - name: Run test suite
        run: bash tests/run.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on production scripts
        run: |
          set -eu
          shellcheck \
            install.sh \
            uninstall.sh \
            update.sh \
            doctor.sh \
            vigil-aliases.sh \
            profiles/default/hooks/prune-worktrees.sh \
            profiles/default/hooks/prune-logs.sh \
            scripts/hooks/pre-push \
            scripts/hooks/prepare-commit-msg
