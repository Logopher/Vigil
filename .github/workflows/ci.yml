name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
      - name: Run test suite
        run: bash tests/run.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck on production scripts
        run: |
          set -eu
          shellcheck \
            install.sh \
            uninstall.sh \
            update.sh \
            doctor.sh \
            vigil-aliases.sh \
            profiles/default/hooks/prune-worktrees.sh \
            profiles/default/hooks/prune-logs.sh \
            scripts/hooks/pre-push \
            scripts/hooks/prepare-commit-msg

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linters
        run: pip install ruff==0.15.12 bandit==1.9.4
      - name: Run ruff
        run: ruff check scripts/
      - name: Run bandit
        run: bandit --severity-level medium --confidence-level high scripts/vigil-review.py scripts/vigil-install-review
